<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>AWTAD - Log In</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --bg-dark: #4B3A57;
      --bg-deep: #382A44;
      --primary-accent: #FFD2C2;
      --primary-strong: #FFB59C;
      --text-soft: rgba(255, 255, 255, 0.78);
      --card-bg: rgba(255, 255, 255, 0.08);
      --card-bg-hover: rgba(255, 255, 255, 0.12);
      --glass-border: rgba(255, 255, 255, 0.14);
      --shadow-soft: 0 18px 45px rgba(0, 0, 0, 0.28);
      --shadow-glow: 0 0 35px rgba(255, 181, 156, 0.16);
      --success: #8dd3a1;
      --danger: #ff8a8a;
      --max-width: 1400px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      min-width: 0;
    }

    body {
      min-height: 100vh;
      background: var(--bg-dark);
      color: white;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 12% 18%, rgba(255, 182, 163, 0.28), transparent 36%),
        radial-gradient(circle at 88% 22%, rgba(255, 209, 194, 0.18), transparent 34%),
        radial-gradient(circle at 50% 82%, rgba(255, 181, 156, 0.18), transparent 44%);
      z-index: -3;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, black, transparent 80%);
      z-index: -2;
      pointer-events: none;
    }

    .navbar {
      position: static;
      z-index: 1000;
      width: 100%;
      margin: 0;
      padding: 20px 6%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.075);
      border-bottom: 1px solid var(--glass-border);
      border-radius: 0;
      backdrop-filter: blur(22px) saturate(140%);
      -webkit-backdrop-filter: blur(22px) saturate(140%);
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: white;
    }

    .logo img {
      width: 115px;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 0 14px rgba(255, 210, 194, 0.16));
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .logo-text strong {
      color: var(--primary-accent);
      font-size: 1.25rem;
      letter-spacing: 0.08em;
    }

    .logo-text span {
      font-size: 0.88rem;
      color: var(--text-soft);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-links a {
      color: rgba(255, 255, 255, 0.78);
      text-decoration: none;
      font-size: 1.05rem;
      padding: 10px 14px;
      border-radius: 999px;
      transition: 0.25s ease;
    }

    .nav-links a:hover {
      color: white;
      background: rgba(255, 255, 255, 0.08);
    }

    .nav-links .login-link {
      color: var(--primary-accent);
      border: 1px solid rgba(255, 210, 194, 0.16);
    }

    .nav-links .signup-link {
      color: #4B3A57;
      background: linear-gradient(135deg, #FFD7C8, #FFBFA9);
      font-weight: 700;
      box-shadow: 0 10px 22px rgba(255, 181, 156, 0.18);
    }

    .nav-links .signup-link:hover {
      color: #4B3A57;
      transform: translateY(-2px);
      background: linear-gradient(135deg, #FFE0D3, #FFC6B2);
    }

    .login-page {
      width: min(100% - 40px, 500px);
      min-height: auto;
      margin: 0 auto;
      padding: 48px 0 32px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .login-card {
      width: 100%;
      padding: 30px 30px;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.055));
      border: 1px solid var(--glass-border);
      box-shadow:
        var(--shadow-soft),
        var(--shadow-glow),
        inset 0 1px 0 rgba(255,255,255,0.07);
      backdrop-filter: blur(20px) saturate(135%);
      -webkit-backdrop-filter: blur(20px) saturate(135%);
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.8s ease both;
    }

    .login-card::before {
      content: "";
      position: absolute;
      width: 170px;
      height: 170px;
      border-radius: 50%;
      right: -70px;
      top: -70px;
      background: rgba(255, 210, 194, 0.12);
      pointer-events: none;
    }

    .login-header {
      text-align: center;
      margin-bottom: 22px;
      position: relative;
      z-index: 1;
    }

    .login-title {
      font-size: 1.9rem;
      font-weight: 300;
      margin-bottom: 8px;
      color: var(--primary-accent);
      text-shadow: 0 0 16px rgba(255, 192, 170, 0.08);
    }

    .login-subtitle {
      color: var(--text-soft);
      font-weight: 300;
      line-height: 1.5;
    }

    #message-container {
      display: none;
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 18px;
      text-align: center;
      font-size: 0.95rem;
      animation: fadeIn 0.4s ease;
      position: relative;
      z-index: 1;
    }

    .msg-error {
      background: rgba(255, 107, 107, 0.15);
      border: 1px solid var(--danger);
      color: #ff9b9b;
    }

    .msg-success {
      background: rgba(141, 211, 161, 0.15);
      border: 1px solid var(--success);
      color: var(--success);
    }

    .form-group {
      margin-bottom: 14px;
      position: relative;
      z-index: 1;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: rgba(255,255,255,0.9);
      font-size: 0.94rem;
    }

    .form-input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 14px;
      color: white;
      font-size: 1rem;
      transition: all 0.25s ease;
      font-family: inherit;
    }

    .form-input::placeholder {
      color: rgba(255,255,255,0.45);
    }

    .form-input:focus {
      outline: none;
      border-color: rgba(255, 182, 163, 0.45);
      box-shadow: 0 0 0 3px rgba(255, 182, 163, 0.08);
    }

    .password-container {
      position: relative;
    }

    .password-container .form-input {
      padding-right: 44px;
    }

    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.75);
      cursor: pointer;
      font-size: 1rem;
    }

    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: -4px;
      margin-bottom: 14px;
      position: relative;
      z-index: 1;
    }

    .forgot-link {
      background: none;
      border: none;
      color: var(--primary-strong);
      cursor: pointer;
      font-size: 0.92rem;
      font-weight: 600;
      font-family: inherit;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    .user-type-options {
      display: flex;
      gap: 14px;
      margin-top: 10px;
    }

    .user-type-option {
      flex: 1;
    }

    .user-type-option input[type="radio"] {
      display: none;
    }

    .user-type-option label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 13px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 15px;
      cursor: pointer;
      text-align: center;
      transition: 0.25s;
    }

    .user-type-option input[type="radio"]:checked + label {
      background: rgba(255, 204, 187, 0.18);
      border-color: var(--primary-accent);
      color: var(--primary-accent);
      box-shadow: 0 0 22px rgba(255, 181, 156, 0.08);
    }

    .login-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #ffd7c8, #ffbfa9);
      border: none;
      border-radius: 15px;
      color: #4B3A57;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      transition: 0.25s;
      margin-top: 8px;
      box-shadow: 0 12px 25px rgba(255, 181, 156, 0.2);
      position: relative;
      z-index: 1;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 30px rgba(255, 181, 156, 0.24);
    }

    .login-btn:disabled {
      background: #888;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .signup-hint {
      text-align: center;
      margin-top: 18px;
      color: rgba(255,255,255,0.78);
      position: relative;
      z-index: 1;
    }

    .signup-hint a {
      color: var(--primary-strong);
      text-decoration: none;
      font-weight: 600;
    }

    .signup-hint a:hover {
      text-decoration: underline;
    }

    footer {
      text-align: center;
      padding: 18px;
      color: rgba(255,255,255,0.6);
      font-size: 0.9rem;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 760px) {
      .navbar {
        padding: 12px 16px;
      }

      .logo img {
        width: 78px;
      }

      .logo-text {
        display: none;
      }

      .nav-links {
        gap: 4px;
      }

      .nav-links a {
        font-size: 0.85rem;
        padding: 9px 10px;
      }

      .login-page {
        width: min(100% - 24px, 500px);
        padding: 34px 0;
      }

      .login-card {
        padding: 26px 20px;
      }

      .user-type-options {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <a href="awtadhp.html" class="logo">
      <img src="awtadlogo1.png" alt="AWTAD Logo">
      <div class="logo-text">
        <strong>AWTAD</strong>
        <span>EMG-based movement insight</span>
      </div>
    </a>

    <div class="nav-links">
      <a href="awtadhp.html">Home</a>
      <a href="signupawtad.html" class="signup-link">Sign Up</a>
    </div>
  </nav>

  <main class="login-page">
    <section class="login-card">
      <div class="login-header">
        <h1 class="login-title">Welcome Back</h1>
        <p class="login-subtitle">Log in to continue to your AWTAD dashboard.</p>
      </div>

      <div id="message-container"></div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="Enter email" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>

          <div class="password-container">
            <input type="password" id="password" class="form-input" placeholder="Enter password" required>
            <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="forgot-row">
          <button type="button" class="forgot-link" id="forgotPasswordBtn">
            Forgot password?
          </button>
        </div>

        <div class="form-group">
          <label class="form-label">Login as:</label>

          <div class="user-type-options">
            <div class="user-type-option">
              <input type="radio" id="client" name="userType" value="client" checked>
              <label for="client"><i class="fas fa-user"></i> Client</label>
            </div>

            <div class="user-type-option">
              <input type="radio" id="coach" name="userType" value="coach">
              <label for="coach"><i class="fas fa-user-tie"></i> Coach</label>
            </div>
          </div>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          Log In
        </button>

        <div class="signup-hint">
          Don't have an account? <a href="signupawtad.html">Sign up now</a>
        </div>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 AWTAD Technologies. Advancing human performance through EMG-based movement awareness.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>

  <script>
    const loginBtn = document.getElementById("loginBtn");
    const messageContainer = document.getElementById("message-container");
    const togglePasswordBtn = document.getElementById("togglePassword");
    const forgotPasswordBtn = document.getElementById("forgotPasswordBtn");

    function showMessage(text, type) {
      messageContainer.textContent = text;
      messageContainer.style.display = "block";
      messageContainer.className = type === "error" ? "msg-error" : "msg-success";
      messageContainer.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    togglePasswordBtn.addEventListener("click", function () {
      const input = document.getElementById("password");

      input.type = input.type === "password" ? "text" : "password";

      this.querySelector("i").classList.toggle("fa-eye");
      this.querySelector("i").classList.toggle("fa-eye-slash");
    });

    forgotPasswordBtn.addEventListener("click", async function () {
      messageContainer.style.display = "none";

      const email = document.getElementById("email").value.trim();

      if (!email) {
        showMessage("Please enter your email address first, then click forgot password.", "error");
        return;
      }

      forgotPasswordBtn.disabled = true;
      forgotPasswordBtn.textContent = "Sending...";

      try {
        const redirectUrl = window.location.origin + "/GP2-website/reset-password.html";

        const { error } = await window.supabase.auth.resetPasswordForEmail(email, {
          redirectTo: redirectUrl
        });

        if (error) {
          throw error;
        }

        showMessage("Password reset link sent. Please check your email.", "success");

      } catch (err) {
        console.error(err);
        showMessage(err.message || "Failed to send reset email.", "error");

      } finally {
        forgotPasswordBtn.disabled = false;
        forgotPasswordBtn.textContent = "Forgot password?";
      }
    });

    document.getElementById("login-form").addEventListener("submit", async function (e) {
      e.preventDefault();
      messageContainer.style.display = "none";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const userType = document.querySelector('input[name="userType"]:checked').value;

      if (!email || !password) {
        showMessage("Please enter your email and password.", "error");
        return;
      }

      loginBtn.innerText = "Verifying...";
      loginBtn.disabled = true;

      try {
        const { data, error: authError } = await window.supabase.auth.signInWithPassword({
          email: email,
          password: password
        });

        if (authError) {
          throw authError;
        }

        if (!data.user) {
          throw new Error("Login failed. Please try again.");
        }

        const tableName = userType === "coach" ? "Coach" : "Client";
        const idCol = userType === "coach" ? "coach_id" : "client_id";

        const { data: profile, error: dbError } = await window.supabase
          .from(tableName)
          .select("*")
          .eq(idCol, data.user.id)
          .single();

        if (dbError || !profile) {
          await window.supabase.auth.signOut();
          throw new Error(`This account is not registered as a ${userType}.`);
        }

        window.location.href = userType === "coach" ? "coachawtad.html" : "userawtad.html";

      } catch (err) {
        console.error(err);

        let errorMsg = err.message || "Login failed.";

        if (errorMsg.includes("Invalid login credentials")) {
          errorMsg = "Incorrect email or password. If you don't have an account, please sign up.";
        }

        showMessage(errorMsg, "error");

      } finally {
        loginBtn.innerText = "Log In";
        loginBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
