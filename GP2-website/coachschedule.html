<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWTAD - Coach Schedule</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --sidebar-width: 220px;
      --primary-accent: #ffd2c2;
      --bg-dark: #4B3A57;
      --card-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.14);
      --transition: all 0.3s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; min-width: 0; }

    body {
      min-height: 100vh;
      background: #4B3A57;
      overflow-x: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      position: relative;
    }

    /* Background Gradients */
    body::before {
      content: ""; position: fixed; inset: 0;
      background: radial-gradient(circle at 15% 25%, rgba(255, 182, 163, 0.30), transparent 42%),
                  radial-gradient(circle at 85% 75%, rgba(255, 209, 179, 0.22), transparent 48%);
      z-index: -2;
    }
    body::after { content: ""; position: fixed; inset: 0; backdrop-filter: blur(2px); z-index: -1; }

    /* SIDEBAR (Identical to Dashboard) */
    .sidebar {
      width: var(--sidebar-width); height: calc(100vh - 24px); margin: 12px;
      position: fixed; top: 0; left: 0; display: flex; flex-direction: column;
      padding: 22px 16px; background: linear-gradient(180deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.04) 100%);
      border: 1px solid var(--glass-border); border-radius: 26px; backdrop-filter: blur(22px) saturate(140%); z-index: 1000;
    }
    .sidebar-brand { text-align: center; padding-bottom: 26px; }
    .sidebar-brand img { width: 105px; filter: drop-shadow(0 0 14px rgba(255, 204, 187, 0.2)); }
    .coach-profile-mini { background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.09); padding: 14px; border-radius: 18px; margin-bottom: 18px; }
    .coach-profile-mini h4 { color: var(--primary-accent); font-size: 0.92rem; margin-bottom: 4px; }
    .coach-profile-mini p { font-size: 0.76rem; opacity: 0.72; }

    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; margin-bottom: 8px; text-decoration: none; color: rgba(255,255,255,0.72); border-radius: 14px; transition: 0.25s; }
    .nav-item:hover, .nav-item.active { color: #fff; background: rgba(255, 204, 187, 0.15); border: 1px solid rgba(255, 210, 194, 0.16); }
    .nav-item i { width: 18px; text-align: center; color: var(--primary-accent); }

    /* MAIN CONTENT */
    .main-content { margin-left: calc(var(--sidebar-width) + 36px); padding: 42px 28px 42px 20px; }

    .welcome-title { font-size: 2.25rem; font-weight: 300; margin-bottom: 10px; }
    .welcome-subtitle { font-size: 1rem; opacity: 0.8; margin-bottom: 30px; }

    /* CALENDAR NAV */
    .schedule-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: var(--card-bg); padding: 15px 25px; border-radius: 20px; border: 1px solid var(--glass-border); }
    .date-controls { display: flex; align-items: center; gap: 15px; }
    .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; transition: 0.3s; }
    .nav-btn:hover { background: var(--primary-accent); color: #4B3A57; }
    .current-date { font-size: 1.2rem; font-weight: 500; color: var(--primary-accent); min-width: 200px; text-align: center; }

    .view-tabs { display: flex; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 30px; }
    .view-tab { padding: 8px 20px; border: none; background: transparent; color: white; border-radius: 25px; cursor: pointer; transition: 0.3s; }
    .view-tab.active { background: var(--primary-accent); color: #4B3A57; font-weight: bold; }

    /* SCHEDULE GRID */
    .schedule-container { background: var(--card-bg); border-radius: 26px; border: 1px solid var(--glass-border); padding: 30px; backdrop-filter: blur(15px); }
    
    .day-schedule.active, .weekly-schedule.active { display: block; animation: fadeIn 0.4s ease; }
    .day-schedule, .weekly-schedule { display: none; }

    /* SESSION CARDS */
    .sessions-list { display: grid; gap: 15px; }
    .session-card { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 18px; padding: 20px; transition: 0.3s; cursor: pointer; }
    .session-card:hover { transform: scale(1.01); border-color: var(--primary-accent); background: rgba(255,255,255,0.1); }
    
    .session-time { color: var(--primary-accent); font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .session-client { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .client-avatar { width: 35px; height: 35px; border-radius: 50%; background: var(--primary-accent); color: #4B3A57; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; }
    
    .status-badge { font-size: 0.75rem; padding: 4px 12px; border-radius: 20px; float: right; }
    .confirmed { background: rgba(141, 211, 161, 0.15); color: #8dd3a1; }

    /* WEEKLY COLUMNS */
    .week-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }
    .day-column { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 15px; min-height: 150px; text-align: center; border: 1px solid transparent; }
    .day-column.today { border-color: var(--primary-accent); background: rgba(255, 210, 194, 0.05); }
    .day-name { font-size: 0.8rem; opacity: 0.6; margin-bottom: 5px; }
    .day-number { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; }

    /* MODAL */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(7px); }
    .modal.active { display: flex; }
    .modal-content { background: #4B3A57; border: 1px solid var(--glass-border); padding: 30px; border-radius: 25px; width: 90%; max-width: 450px; }
    .modal-btn { padding: 12px 20px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 15px; }
    .btn-primary { background: var(--primary-accent); color: #4B3A57; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>

<body>
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="awtadlogo1.png" alt="AWTAD">
    </div>
    <div class="coach-profile-mini">
      <h4 id="coachNameSide">Loading...</h4>
      <p id="coachEmailSide">—</p>
    </div>
    <nav class="sidebar-nav">
        <a href="coachawtad.html" class="nav-item"><i class="fas fa-th-large"></i> <span class="nav-text">Dashboard</span></a>
        <a href="MyAthletes.html" class="nav-item"><i class="fas fa-users"></i> <span class="nav-text">My Athletes</span></a>
        <a href="coachschedule.html" class="nav-item active"><i class="fas fa-calendar"></i> <span class="nav-text">Schedule</span></a>
        <a href="#" class="nav-item"><i class="fas fa-chart-line"></i> <span class="nav-text">Analytics</span></a>
    </nav>
    <a href="loginawtad.html" id="logoutBtn" class="nav-item" style="margin-top: auto;">
      <i class="fas fa-sign-out-alt"></i> <span class="nav-text">Logout</span>
    </a>
  </aside>

  <main class="main-content">
    <h1 class="welcome-title">Training Schedule</h1>
    <p class="welcome-subtitle">Manage and track your athlete sessions.</p>

    <div class="schedule-nav">
      <div class="date-controls">
        <button class="nav-btn" id="prevDay"><i class="fas fa-chevron-left"></i></button>
        <div class="current-date" id="currentDate">Monday, December 9</div>
        <button class="nav-btn" id="nextDay"><i class="fas fa-chevron-right"></i></button>
        <button class="nav-btn" id="todayBtn" style="width: auto; padding: 0 15px; border-radius: 15px;">Today</button>
      </div>

      <div class="view-tabs">
        <button class="view-tab active" data-view="day">Day</button>
        <button class="view-tab" data-view="week">Week</button>
      </div>
    </div>

    <div class="schedule-container">
      <div class="day-schedule active" id="dayView">
        <div class="sessions-list" id="daySessionsList">
          </div>
        <div id="dayNoSessions" style="display: none; text-align: center; opacity: 0.5; padding: 40px;">
            <i class="fas fa-calendar-times fa-3x" style="margin-bottom: 15px;"></i>
            <p>No sessions scheduled for this day.</p>
        </div>
      </div>

      <div class="weekly-schedule" id="weekView">
        <div class="week-days" id="weekDays">
          </div>
      </div>
    </div>
  </main>

  <div class="modal" id="sessionModal">
    <div class="modal-content">
      <h3 id="modalTitle" style="color: var(--primary-accent); margin-bottom: 20px;">Session Details</h3>
      <div style="opacity: 0.8; line-height: 1.8;">
          <p><strong>Athlete:</strong> <span id="modalClient"></span></p>
          <p><strong>Time:</strong> <span id="modalTime"></span></p>
          <p><strong>Type:</strong> <span id="modalType"></span></p>
          <p style="margin-top: 10px;"><strong>Notes:</strong> <br><span id="modalNotes"></span></p>
      </div>
      <div style="display: flex; gap: 10px; margin-top: 25px;">
          <button class="modal-btn" id="closeModal" style="flex: 1; background: rgba(255,255,255,0.1); color: white;">Close</button>
          <button class="modal-btn btn-primary" id="startSession" style="flex: 2;">Start Session</button>
      </div>
    </div>
  </div>
<script>
    // 1. Configuration & Global Variables
    const SUPABASE_URL = "https://mtxungnwzittdxnfdhvd.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_pPnHK3uF-_roE6wmByPKxw_-kt5gpgr";
    const supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentCoach = null;
    let currentDate = new Date();

    // Sample Data (Tip: You can later replace this with a supa.from('Session') fetch)
    const sessions = [
      { id: 1, client: "Norah Al-Mutairi", initials: "NA", type: "Squat Analysis", date: "2026-03-28", startTime: "10:00", endTime: "11:00", status: "confirmed", notes: "Focus on VL activation." },
      { id: 2, client: "Ahmed Hassan", initials: "AH", type: "Jump Analysis", date: "2026-03-28", startTime: "14:00", endTime: "15:00", status: "confirmed", notes: "Check gastro imbalance." }
    ];

    /**
     * 2. Auth & Profile Initialization
     * Fetches the logged-in coach and updates the sidebar.
     */
    async function initCoach() {
        const { data: { user } } = await supa.auth.getUser();
        
        if (!user) { 
            window.location.href = "loginawtad.html"; 
            return; 
        }

        const { data: coach, error } = await supa
            .from('Coach')
            .select('*')
            .eq('email', user.email)
            .single();

        if (coach) {
            currentCoach = coach;
            // Update Sidebar IDs
            document.getElementById('coachNameSide').innerText = `${coach.Fname} ${coach.Lname}`;
            document.getElementById('coachEmailSide').innerText = coach.email;
            
            // Now that coach is loaded, show the calendar
            updateDisplay(); 
        } else {
            console.error("Coach profile not found.");
            document.getElementById('coachNameSide').innerText = "Profile Error";
        }
    }

    /**
     * 3. UI Display Logic
     */
    function updateDisplay() {
        const options = { weekday: 'long', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = currentDate.toLocaleDateString('en-US', options);
        loadDayView();
    }

    function loadDayView() {
        const list = document.getElementById('daySessionsList');
        const empty = document.getElementById('dayNoSessions');
        
        // Format date to match YYYY-MM-DD for filtering
        const dateStr = currentDate.getFullYear() + '-' + 
                        String(currentDate.getMonth() + 1).padStart(2, '0') + '-' + 
                        String(currentDate.getDate()).padStart(2, '0');
        
        const filtered = sessions.filter(s => s.date === dateStr);

        list.innerHTML = "";
        if (filtered.length === 0) { 
            empty.style.display = "block"; 
            return; 
        }
        empty.style.display = "none";

        filtered.forEach(s => {
            list.innerHTML += `
                <div class="session-card" onclick="openModal(${s.id})">
                    <span class="status-badge confirmed">Confirmed</span>
                    <div class="session-time"><i class="far fa-clock"></i> ${s.startTime} - ${s.endTime}</div>
                    <div class="session-client">
                        <div class="client-avatar">${s.initials}</div>
                        <div class="client-name">${s.client}</div>
                    </div>
                    <div style="font-size: 0.9rem; opacity: 0.7;">${s.type}</div>
                </div>
            `;
        });
    }

    function loadWeekView() {
        const container = document.getElementById('weekDays');
        container.innerHTML = "";
        const start = new Date(currentDate);
        start.setDate(currentDate.getDate() - currentDate.getDay());

        for (let i=0; i<7; i++) {
            const d = new Date(start);
            d.setDate(start.getDate() + i);
            const isToday = d.toDateString() === new Date().toDateString();
            
            container.innerHTML += `
                <div class="day-column ${isToday ? 'today' : ''}">
                    <div class="day-name">${d.toLocaleDateString('en-US', {weekday: 'short'})}</div>
                    <div class="day-number">${d.getDate()}</div>
                    <div style="font-size: 0.7rem; opacity: 0.5;">0 sessions</div>
                </div>
            `;
        }
    }

    function openModal(id) {
        const s = sessions.find(x => x.id === id);
        if (!s) return;
        document.getElementById('modalClient').innerText = s.client;
        document.getElementById('modalTime').innerText = `${s.startTime} - ${s.endTime}`;
        document.getElementById('modalType').innerText = s.type;
        document.getElementById('modalNotes').innerText = s.notes;
        document.getElementById('sessionModal').classList.add('active');
    }

    /**
     * 4. Event Listeners
     */
    document.addEventListener('DOMContentLoaded', () => {
        // Start Auth check
        initCoach(); 

        // Nav Handlers
        document.getElementById('prevDay').onclick = () => { currentDate.setDate(currentDate.getDate() - 1); updateDisplay(); };
        document.getElementById('nextDay').onclick = () => { currentDate.setDate(currentDate.getDate() + 1); updateDisplay(); };
        document.getElementById('todayBtn').onclick = () => { currentDate = new Date(); updateDisplay(); };

        // View Tabs
        document.querySelectorAll('.view-tab').forEach(tab => {
            tab.onclick = (e) => {
                document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                const view = e.target.getAttribute('data-view');
                document.getElementById('dayView').classList.toggle('active', view === 'day');
                document.getElementById('weekView').classList.toggle('active', view === 'week');
                if (view === 'week') loadWeekView();
            };
        });

        // Modal Close
        document.getElementById('closeModal').onclick = () => document.getElementById('sessionModal').classList.remove('active');
        
        // Logout Logic
        document.getElementById('logoutBtn').onclick = async (e) => {
            e.preventDefault();
            if (confirm("Are you sure you want to logout?")) {
                await supa.auth.signOut();
                window.location.href = "loginawtad.html";
            }
        };
    });
  </script>
</body>
</html>
