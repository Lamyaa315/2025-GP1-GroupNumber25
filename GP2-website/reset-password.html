<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AWTAD - Reset Password</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>
<body style="font-family:Segoe UI; background:#4B3A57; color:white; display:flex; justify-content:center; align-items:center; min-height:100vh;">
  <div style="width:420px; padding:30px; border-radius:24px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.14);">
    <h1 style="color:#FFD2C2;">Reset Password</h1>
    <p>Enter your new password.</p>

    <input id="newPassword" type="password" placeholder="New password"
      style="width:100%; padding:13px; border-radius:14px; margin-top:15px; border:none;">

    <button id="resetBtn"
      style="width:100%; padding:13px; border-radius:14px; margin-top:15px; border:none; background:#FFD2C2; color:#4B3A57; font-weight:bold;">
      Update Password
    </button>

    <p id="message" style="margin-top:15px;"></p>
  </div>

  <script>
    document.getElementById("resetBtn").addEventListener("click", async function () {
      const password = document.getElementById("newPassword").value.trim();
      const message = document.getElementById("message");

      if (!password || password.length < 6) {
        message.textContent = "Password must be at least 6 characters.";
        message.style.color = "#ff8a8a";
        return;
      }

      const { error } = await window.supabase.auth.updateUser({
        password: password
      });

      if (error) {
        message.textContent = error.message;
        message.style.color = "#ff8a8a";
        return;
      }

      message.textContent = "Password updated successfully. Redirecting to login...";
      message.style.color = "#8dd3a1";

      setTimeout(() => {
        window.location.href = "loginawtad.html";
      }, 1800);
    });
  </script>
</body>
</html>
