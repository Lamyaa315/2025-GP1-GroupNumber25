<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AWTAD - Reset Password</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --bg-dark: #4B3A57;
      --primary-accent: #FFD2C2;
      --primary-strong: #FFB59C;
      --text-soft: rgba(255, 255, 255, 0.78);
      --glass-border: rgba(255,255,255,0.14);
      --success: #8dd3a1;
      --danger: #ff8a8a;
      --shadow-soft: 0 18px 45px rgba(0,0,0,0.28);
      --shadow-glow: 0 0 35px rgba(255,181,156,0.16);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height:100vh;
      background:var(--bg-dark);
      color:white;
      font-family:"Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      position:relative;
    }

    body::before {
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 12% 18%, rgba(255,182,163,0.28), transparent 36%),
        radial-gradient(circle at 88% 22%, rgba(255,209,194,0.18), transparent 34%),
        radial-gradient(circle at 50% 82%, rgba(255,181,156,0.18), transparent 44%);
      z-index:-2;
    }

    body::after {
      content:"";
      position:fixed;
      inset:0;
      background:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size:42px 42px;
      z-index:-1;
    }

    .navbar {
      width:100%;
      padding:20px 6%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:rgba(255,255,255,0.075);
      border-bottom:1px solid var(--glass-border);
      backdrop-filter:blur(22px);
    }

    .logo {
      display:flex;
      align-items:center;
      gap:12px;
      color:white;
      text-decoration:none;
    }

    .logo img {
      width:115px;
      filter:drop-shadow(0 0 14px rgba(255,210,194,0.16));
    }

    .logo-text strong {
      display:block;
      color:var(--primary-accent);
      letter-spacing:0.08em;
      font-size:1.25rem;
    }

    .logo-text span {
      color:var(--text-soft);
      font-size:0.88rem;
    }

    .nav-links a {
      color:var(--primary-accent);
      text-decoration:none;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(255,210,194,0.16);
    }

    .reset-page {
      width:min(100% - 40px, 500px);
      margin:0 auto;
      padding:48px 0 32px;
    }

    .reset-card {
      width:100%;
      padding:32px;
      border-radius:28px;
      background:linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.055));
      border:1px solid var(--glass-border);
      box-shadow:var(--shadow-soft), var(--shadow-glow), inset 0 1px 0 rgba(255,255,255,0.07);
      backdrop-filter:blur(20px);
      position:relative;
      overflow:hidden;
      animation:fadeUp 0.8s ease both;
    }

    .reset-card::before {
      content:"";
      position:absolute;
      width:170px;
      height:170px;
      border-radius:50%;
      right:-70px;
      top:-70px;
      background:rgba(255,210,194,0.12);
    }

    .reset-header {
      text-align:center;
      margin-bottom:24px;
      position:relative;
      z-index:1;
    }

    .reset-title {
      color:var(--primary-accent);
      font-size:2rem;
      font-weight:300;
      margin-bottom:8px;
    }

    .reset-subtitle {
      color:var(--text-soft);
      line-height:1.5;
    }

    .form-group {
      margin-bottom:16px;
      position:relative;
      z-index:1;
    }

    .form-label {
      display:block;
      margin-bottom:8px;
      font-size:0.94rem;
      color:rgba(255,255,255,0.9);
      font-weight:500;
    }

    .password-container {
      position:relative;
    }

    .form-input {
      width:100%;
      padding:13px 44px 13px 15px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.14);
      border-radius:14px;
      color:white;
      font-size:1rem;
      font-family:inherit;
    }

    .form-input::placeholder {
      color:rgba(255,255,255,0.45);
    }

    .form-input:focus {
      outline:none;
      border-color:rgba(255,182,163,0.45);
      box-shadow:0 0 0 3px rgba(255,182,163,0.08);
    }

    .password-toggle {
      position:absolute;
      right:14px;
      top:50%;
      transform:translateY(-50%);
      background:none;
      border:none;
      color:rgba(255,255,255,0.75);
      cursor:pointer;
      font-size:1rem;
    }

    .password-requirements {
      margin-top:10px;
      padding:12px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:14px;
      font-size:0.85rem;
      display:none;
    }

    .password-requirements.show {
      display:block;
    }

    .requirement {
      display:flex;
      align-items:center;
      gap:8px;
      margin-bottom:6px;
      color:var(--danger);
    }

    .requirement.valid {
      color:var(--success);
    }

    .reset-btn {
      width:100%;
      padding:14px;
      background:linear-gradient(135deg, #ffd7c8, #ffbfa9);
      border:none;
      border-radius:15px;
      color:#4B3A57;
      font-size:1.05rem;
      font-weight:800;
      cursor:pointer;
      transition:0.25s;
      margin-top:8px;
      box-shadow:0 12px 25px rgba(255,181,156,0.2);
      position:relative;
      z-index:1;
    }

    .reset-btn:hover {
      transform:translateY(-2px);
    }

    #message {
      display:none;
      margin-bottom:18px;
      padding:14px;
      border-radius:14px;
      text-align:center;
      position:relative;
      z-index:1;
    }

    .msg-error {
      display:block !important;
      background:rgba(255,107,107,0.15);
      border:1px solid var(--danger);
      color:#ff9b9b;
    }

    .msg-success {
      display:block !important;
      background:rgba(141,211,161,0.15);
      border:1px solid var(--success);
      color:var(--success);
    }

    footer {
      text-align:center;
      padding:18px;
      color:rgba(255,255,255,0.6);
      font-size:0.9rem;
      border-top:1px solid rgba(255,255,255,0.08);
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(24px); }
      to { opacity:1; transform:translateY(0); }
    }

    @media (max-width:760px) {
      .logo img { width:78px; }
      .logo-text { display:none; }
      .reset-card { padding:26px 20px; }
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <a href="awtadhp.html" class="logo">
      <img src="awtadlogo1.png" alt="AWTAD Logo">
      <div class="logo-text">
        <strong>AWTAD</strong>
        <span>EMG-based movement insight</span>
      </div>
    </a>

    <div class="nav-links">
      <a href="loginawtad.html">Log In</a>
    </div>
  </nav>

  <main class="reset-page">
    <section class="reset-card">
      <div class="reset-header">
        <h1 class="reset-title">Reset Password</h1>
        <p class="reset-subtitle">Create a new secure password for your AWTAD account.</p>
      </div>

      <p id="message"></p>

      <div class="form-group">
        <label class="form-label" for="password">New Password</label>

        <div class="password-container">
          <input type="password" id="password" class="form-input" placeholder="Create new password">
          <button type="button" class="password-toggle" id="togglePassword">
            <i class="fas fa-eye"></i>
          </button>
        </div>

        <div class="password-requirements" id="passwordRequirements">
          <div class="requirement" id="lengthReq"><i class="fas fa-times"></i> 12+ characters</div>
          <div class="requirement" id="lowercaseReq"><i class="fas fa-times"></i> Lowercase letter</div>
          <div class="requirement" id="digitReq"><i class="fas fa-times"></i> Digit (0-9)</div>
          <div class="requirement" id="specialReq"><i class="fas fa-times"></i> Special character</div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm Password</label>

        <div class="password-container">
          <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm new password">
          <button type="button" class="password-toggle" id="toggleConfirmPassword">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <button class="reset-btn" id="resetBtn">Update Password</button>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 AWTAD Technologies. Advancing human performance through EMG-based movement awareness.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>

  <script>
    const passwordInput = document.getElementById("password");
    const confirmPasswordInput = document.getElementById("confirmPassword");
    const message = document.getElementById("message");
    const resetBtn = document.getElementById("resetBtn");

    function showMessage(text, type) {
      message.textContent = text;
      message.className = type === "error" ? "msg-error" : "msg-success";
      message.style.display = "block";
    }

    function updateReq(id, isValid) {
      const el = document.getElementById(id);
      el.classList.toggle("valid", isValid);
      el.querySelector("i").className = isValid ? "fas fa-check" : "fas fa-times";
    }

    function isPasswordValid(password) {
      return (
        password.length >= 12 &&
        /[a-z]/.test(password) &&
        /\d/.test(password) &&
        /[!@#$%^&*]/.test(password)
      );
    }

    passwordInput.addEventListener("input", function () {
      const val = this.value;
      document.getElementById("passwordRequirements").classList.add("show");

      updateReq("lengthReq", val.length >= 12);
      updateReq("lowercaseReq", /[a-z]/.test(val));
      updateReq("digitReq", /\d/.test(val));
      updateReq("specialReq", /[!@#$%^&*]/.test(val));
    });

    document.querySelectorAll(".password-toggle").forEach(btn => {
      btn.addEventListener("click", function () {
        const input = this.previousElementSibling;
        input.type = input.type === "password" ? "text" : "password";
        this.querySelector("i").classList.toggle("fa-eye");
        this.querySelector("i").classList.toggle("fa-eye-slash");
      });
    });

    resetBtn.addEventListener("click", async function () {
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (!isPasswordValid(password)) {
        showMessage("Password does not meet the requirements.", "error");
        return;
      }

      if (password !== confirmPassword) {
        showMessage("Passwords do not match.", "error");
        return;
      }

      resetBtn.disabled = true;
      resetBtn.textContent = "Updating...";

      const { error } = await window.supabase.auth.updateUser({
        password: password
      });

      if (error) {
        showMessage(error.message, "error");
        resetBtn.disabled = false;
        resetBtn.textContent = "Update Password";
        return;
      }

      showMessage("Password updated successfully. Redirecting to login...", "success");

      setTimeout(() => {
        window.location.href = "loginawtad.html";
      }, 1800);
    });
  </script>
</body>
</html>
