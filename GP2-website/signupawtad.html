<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWTAD - Sign Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-accent: #ffd2c2;
            --primary-strong: #ffb59c;
            --bg-dark: #4B3A57;
            --card-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.14);
            --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.22);
            --shadow-glow: 0 0 30px rgba(255, 181, 156, 0.12);
            --success: #8dd3a1;
            --danger: #ff6b6b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #4B3A57;
            overflow-x: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 15% 25%, rgba(255, 182, 163, 0.30), transparent 42%),
                radial-gradient(circle at 85% 75%, rgba(255, 209, 179, 0.22), transparent 48%),
                radial-gradient(circle at 55% 45%, rgba(255, 160, 140, 0.10), transparent 50%);
            z-index: -2;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            z-index: -1;
        }

        .navbar {
            position: static;
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(18px) saturate(140%);
            -webkit-backdrop-filter: blur(18px) saturate(140%);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: var(--shadow-soft);
        }

        .logo {
            display: flex;
            align-items: center;
            height: 100px;
            margin: -15px 0;
        }

        .logo img {
            height: 100%;
            width: auto;
            max-height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 0 14px rgba(255, 204, 187, 0.15));
        }

        .nav-links {
            display: flex;
            gap: 28px;
            align-items: center;
        }

        .nav-links a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-weight: 300;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-links a:hover {
            color: var(--primary-accent);
        }

        .nav-links a::after {
            content: "";
            position: absolute;
            width: 0;
            height: 1px;
            left: 0;
            bottom: -6px;
            background: var(--primary-accent);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .signup-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 160px);
            padding: 40px 20px;
        }

        .signup-card {
            width: 100%;
            max-width: 540px;
            padding: 38px 32px;
            border-radius: 26px;
            background: linear-gradient(
                180deg,
                rgba(255,255,255,0.08) 0%,
                rgba(255,255,255,0.05) 100%
            );
            border: 1px solid var(--glass-border);
            box-shadow:
                var(--shadow-soft),
                var(--shadow-glow),
                inset 0 1px 0 rgba(255,255,255,0.07);
            backdrop-filter: blur(18px) saturate(135%);
            -webkit-backdrop-filter: blur(18px) saturate(135%);
            position: relative;
            overflow: hidden;
        }

        .signup-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(
                135deg,
                rgba(255,255,255,0.07) 0%,
                transparent 42%
            );
            pointer-events: none;
        }

        .signup-header {
            text-align: center;
            margin-bottom: 28px;
            position: relative;
            z-index: 1;
        }

        .signup-title {
            font-size: 2.2rem;
            font-weight: 300;
            margin-bottom: 10px;
            color: var(--primary-accent);
            text-shadow: 0 0 16px rgba(255, 192, 170, 0.08);
        }

        .signup-subtitle {
            opacity: 0.8;
            font-weight: 300;
        }

        #signup-form {
            position: relative;
            z-index: 1;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 400;
            color: rgba(255,255,255,0.92);
        }

        .form-input {
            width: 100%;
            padding: 13px 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .form-input::placeholder {
            color: rgba(255,255,255,0.45);
        }

        .form-input:focus {
            outline: none;
            border-color: rgba(255, 182, 163, 0.45);
            box-shadow: 0 0 0 3px rgba(255, 182, 163, 0.08);
            background: rgba(255, 255, 255, 0.10);
        }

        .user-type-container {
            margin-bottom: 26px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.10);
        }

        .user-type-options {
            display: flex;
            gap: 14px;
            margin-top: 10px;
        }

        .user-type-option {
            flex: 1;
            text-align: center;
        }

        .user-type-option input[type="radio"] {
            display: none;
        }

        .user-type-option label {
            display: block;
            padding: 13px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 14px;
            cursor: pointer;
            transition: 0.3s;
            color: rgba(255,255,255,0.82);
        }

        .user-type-option label i {
            margin-right: 6px;
        }

        .user-type-option input[type="radio"]:checked + label {
            background: linear-gradient(
                135deg,
                rgba(255, 204, 187, 0.18),
                rgba(255, 255, 255, 0.06)
            );
            border-color: rgba(255, 210, 194, 0.24);
            color: var(--primary-accent);
            box-shadow: 0 0 18px rgba(255, 181, 156, 0.10);
        }

        #specialty-group {
            display: none;
        }

        .password-container {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255,255,255,0.75);
            cursor: pointer;
            font-size: 0.95rem;
        }

        .password-toggle:hover {
            color: var(--primary-accent);
        }

        .password-requirements {
            margin-top: 10px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            font-size: 0.85rem;
            display: none;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .password-requirements.show {
            display: block;
        }

        .requirement {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            color: var(--danger);
        }

        .requirement:last-child {
            margin-bottom: 0;
        }

        .requirement.valid {
            color: var(--success);
        }

        .signup-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ffd7c8, #ffbfa9);
            border: none;
            border-radius: 14px;
            color: #4B3A57;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 18px rgba(255, 181, 156, 0.20);
        }

        .signup-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 22px rgba(255, 181, 156, 0.24);
        }

        .signup-btn:disabled {
            background: rgba(255,255,255,0.3);
            color: rgba(75, 58, 87, 0.8);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .login-hint {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.8);
        }

        .login-hint a {
            color: var(--primary-strong);
            text-decoration: none;
        }

        .login-hint a:hover {
            color: var(--primary-accent);
        }

        footer {
            text-align: center;
            padding: 32px 20px 40px;
            opacity: 0.72;
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 16px 20px;
                flex-direction: column;
                gap: 12px;
            }

            .nav-links {
                gap: 18px;
                flex-wrap: wrap;
                justify-content: center;
            }

            .signup-container {
                padding: 24px 16px;
                min-height: auto;
            }

            .signup-card {
                padding: 28px 20px;
                border-radius: 22px;
            }

            .signup-title {
                font-size: 1.9rem;
            }

            .user-type-options {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <img src="awtadlogo1.png" alt="Awtad Logo">
        </div>
        <div class="nav-links">
            <a href="awtadhp.html">Home</a>
            <a href="#">About Us</a>
            <a href="loginawtad.html">Log In</a>
        </div>
    </nav>

    <section class="signup-container">
        <div class="signup-card">
            <div class="signup-header">
                <h1 class="signup-title">Create Account</h1>
                <p class="signup-subtitle">Join AWTAD to track muscle activation</p>
            </div>

            <form id="signup-form">
                <div class="user-type-container">
                    <label class="form-label">I am signing up as:</label>
                    <div class="user-type-options">
                        <div class="user-type-option">
                            <input type="radio" id="client" name="userType" value="client" checked>
                            <label for="client"><i class="fas fa-user"></i> Client</label>
                        </div>
                        <div class="user-type-option">
                            <input type="radio" id="coach" name="userType" value="coach">
                            <label for="coach"><i class="fas fa-chalkboard-teacher"></i> Coach</label>
                        </div>
                    </div>
                </div>

                <div class="form-group" id="specialty-group">
                    <label class="form-label" for="specialty">Specialty</label>
                    <input type="text" id="specialty" class="form-input" placeholder="e.g. Physiotherapy, Fitness">
                </div>

                <div class="form-group">
                    <label class="form-label" for="fullname">Full Name</label>
                    <input type="text" id="fullname" class="form-input" placeholder="Enter full name" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="Enter email" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="phone">Phone Number</label>
                    <input type="tel" id="phone" class="form-input" placeholder="10-digit phone" required maxlength="10">
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="password-container">
                        <input type="password" id="password" class="form-input" placeholder="Create password" required>
                        <button type="button" class="password-toggle"><i class="fas fa-eye"></i></button>
                    </div>
                    <div class="password-requirements" id="passwordRequirements">
                        <div class="requirement" id="lengthReq"><i class="fas fa-times"></i> 12+ characters</div>
                        <div class="requirement" id="lowercaseReq"><i class="fas fa-times"></i> Lowercase letter</div>
                        <div class="requirement" id="digitReq"><i class="fas fa-times"></i> Digit (0-9)</div>
                        <div class="requirement" id="specialReq"><i class="fas fa-times"></i> Special character</div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirm-password">Confirm Password</label>
                    <div class="password-container">
                        <input type="password" id="confirm-password" class="form-input" placeholder="Confirm password" required>
                        <button type="button" class="password-toggle"><i class="fas fa-eye"></i></button>
                    </div>
                </div>

                <button type="submit" class="signup-btn" id="submitBtn">Create Account</button>

                <div class="login-hint">
                    Already have an account?
                    <a href="loginawtad.html">Log in</a>
                </div>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2025 AWTAD Technologies.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirm-password');
        const specialtyGroup = document.getElementById('specialty-group');
        const specialtyInput = document.getElementById('specialty');
        const userTypeRadios = document.querySelectorAll('input[name="userType"]');

        userTypeRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                if (e.target.value === 'coach') {
                    specialtyGroup.style.display = 'block';
                    specialtyInput.required = true;
                } else {
                    specialtyGroup.style.display = 'none';
                    specialtyInput.required = false;
                }
            });
        });

        document.querySelectorAll('.password-toggle').forEach(btn => {
            btn.addEventListener('click', function() {
                const input = this.previousElementSibling;
                input.type = input.type === 'password' ? 'text' : 'password';
                this.querySelector('i').classList.toggle('fa-eye');
                this.querySelector('i').classList.toggle('fa-eye-slash');
            });
        });

        passwordInput.addEventListener('input', function() {
            const val = this.value;
            document.getElementById('passwordRequirements').classList.add('show');
            updateReq('lengthReq', val.length >= 12);
            updateReq('lowercaseReq', /[a-z]/.test(val));
            updateReq('digitReq', /\d/.test(val));
            updateReq('specialReq', /[!@#$%^&*]/.test(val));
        });

        function updateReq(id, isValid) {
            const el = document.getElementById(id);
            if (el) {
                el.classList.toggle('valid', isValid);
                el.querySelector('i').className = isValid ? 'fas fa-check' : 'fas fa-times';
            }
        }

        document.getElementById('signup-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const fullName = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = passwordInput.value;
            const userType = document.querySelector('input[name="userType"]:checked').value;
            const specialty = specialtyInput.value;
            const submitBtn = document.getElementById('submitBtn');

            if (password !== confirmPasswordInput.value) {
                alert("Passwords do not match!");
                return;
            }

            submitBtn.innerText = "Processing...";
            submitBtn.disabled = true;

            try {
                const client = window.supabase;
                const { data, error: authError } = await client.auth.signUp({
                    email: email,
                    password: password,
                });

                if (authError) throw authError;

                if (data.user) {
                    const nameParts = fullName.split(' ');
                    const fname = nameParts[0];
                    const lname = nameParts.slice(1).join(' ') || '';
                    const tableName = (userType === 'coach') ? 'Coach' : 'Client';
                    const idCol = (userType === 'coach') ? 'coach_id' : 'client_id';

                    const insertData = {
                        [idCol]: data.user.id,
                        Fname: fname,
                        Lname: lname,
                        email: email,
                        Phone_Number: phone
                    };

                    if (userType === 'coach') {
                        insertData.Specialty = specialty;
                    }

                    const { error: dbError } = await client
                        .from(tableName)
                        .insert([insertData]);

                    if (dbError) throw dbError;

                    alert("Success! Account created and profile saved.");
                    window.location.href = "luserawtad.html";
                }
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                submitBtn.innerText = "Create Account";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
